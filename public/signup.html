<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signup</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
    }

    .container {
      width: 400px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    .input-group input:focus {
      border: 2px solid #a29bfe;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #a29bfe;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .success {
      color: #55efc4;
    }

    .error {
      color: #ff7675;
    }

    .login-link {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .login-link a {
      color: #dfe6e9;
      text-decoration: none;
      font-weight: bold;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>

<div class="container">

  <h2>Create Account</h2>

  <form id="signupForm">

    <div class="input-group">
      <label>Name</label>
      <input type="text" id="name" required>
    </div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required minlength="6">
    </div>

    <div class="input-group">
      <label>Age</label>
      <input type="number" id="age" required>
    </div>

    <div class="input-group">
      <label>Weight (kg)</label>
      <input type="number" id="weight" required>
    </div>

    <div class="input-group">
      <label>Height (cm)</label>
      <input type="number" id="height" required>
    </div>

    <div class="input-group">
      <label>Average Cycle Length</label>
      <input type="number" id="cycleLength" required>
    </div>

    <div class="input-group">
      <label>Last Period Date</label>
      <input type="date" id="lastPeriod" required>
    </div>

    <button type="submit" id="submitBtn">
      Create Account
    </button>

  </form>

  <div id="message" class="message"></div>

  <div class="login-link">
    Already have an account?
    <a href="/login">Login</a>
  </div>

</div>

<script>

const form = document.getElementById("signupForm");
const message = document.getElementById("message");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.innerText = "Creating Account...";

  message.innerHTML = "";

  const data = {
    name: document.getElementById("name").value,
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
    age: document.getElementById("age").value,
    weight: document.getElementById("weight").value,
    height: document.getElementById("height").value,
    cycleLength: document.getElementById("cycleLength").value,
    lastPeriod: document.getElementById("lastPeriod").value
  };

  try {

    const res = await fetch("/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.error) {

      message.innerHTML = result.error;
      message.className = "message error";

    } else {

      message.innerHTML = "Account created successfully!";
      message.className = "message success";

      setTimeout(() => {
        window.location.href = "/login";
      }, 1500);

    }

  } catch (err) {

    message.innerHTML = "Something went wrong";
    message.className = "message error";

  }

  submitBtn.disabled = false;
  submitBtn.innerText = "Create Account";

});

</script>

</body>
</html>
